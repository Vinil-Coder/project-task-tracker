<div class="table-container">
    <table>
        <thead class="table-header">
            <tr>
                <th>S.No</th>
                <th *ngFor="let col of tableData?.cols">{{ col }}</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let row of tableData?.rows; let i = index">
                <td>{{ i + 1}}</td>
                <td>{{ row.title }}</td>
                <td>{{ row.description }}</td>
                <td>{{ row.status }}</td>
                <td>{{ row.priority }}</td>
                <td>{{ row.startDate | date: 'yyyy-MM-dd' }}</td>
                <td>{{ row.endDate | date: 'yyyy-MM-dd' }}</td>
                <td class="action-buttons">
                    <!-- Edit Icon -->
                    <button class="icon-btn edit" title="Edit">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            viewBox="0 0 16 16">
                            <path
                                d="M12.146.854a.5.5 0 0 1 .708 0l2.292 2.292a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 3L13 4.793 12.207 5.586 10.414 3.793 11.207 3zM10.5 4.5 2 13v1h1l8.5-8.5L10.5 4.5z" />
                        </svg>
                    </button>
                    <!-- Delete Icon -->
                    <button class="icon-btn delete" title="Delete">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            viewBox="0 0 16 16">
                            <path
                                d="M5.5 5.5A.5.5 0 0 1 6 5h4a.5.5 0 0 1 0 1H6a.5.5 0 0 1-.5-.5zM4.118 4 4 4.059V5h8V4.059L11.882 4H4.118zM2.5 3h11a.5.5 0 0 1 .5.5V4h-12v-.5a.5.5 0 0 1 .5-.5zM3.5 6v7a2 2 0 0 0 2 2h5a2 2 0 0 0 2-2V6h-9z" />
                        </svg>
                    </button>
            </tr>
            <tr *ngIf="tableData?.rows?.length === 0">
                <td colspan="8" style="text-align: center;">No List</td>
            </tr>
        </tbody>
    </table>
</div>
