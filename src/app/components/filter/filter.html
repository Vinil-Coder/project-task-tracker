<div class="modal">
    <div class="modal-header">
        <h3 class="modal-title">Filters</h3>

        <button class="close-btn">

            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">

                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>

            </svg>

        </button>
    </div>
    <div class="modal-body">
        <!-- Form Block -->
        <form class="form-block">

            <div class="form-container">

                <!-- Priority -->
                <div class="form-field custom-select" (click)="togglePriorityDropdown($event)" #priorityDropdown>

                    <label>Priority</label>

                    <div class="select-box">
                        {{ selectedPriority || 'Select Priority' }}
                        <span class="arrow"></span>
                    </div>

                    <ul class="dropdown" *ngIf="priorityDropdownOpen">
                        <li (click)="selectPriority('Low', $event)">Low</li>
                        <li (click)="selectPriority('Medium', $event)">Medium</li>
                        <li (click)="selectPriority('High', $event)">High</li>
                        <li (click)="selectPriority('Critical', $event)">Critical</li>
                    </ul>

                </div>

                <!-- Status -->
                <div class="form-field custom-select" (click)="toggleStatusDropdown($event)" #statusDropdown>

                    <label>Status</label>

                    <div class="select-box">
                        {{ selectedStatus || 'Select Status' }}
                        <span class="arrow"></span>
                    </div>

                    <ul class="dropdown" *ngIf="statusDropdownOpen">
                        <li (click)="selectStatus('Initiated', $event)">Initiated</li>
                        <li (click)="selectStatus('In Progress', $event)">In Progress</li>
                        <li (click)="selectStatus('Completed', $event)">Completed</li>
                        <li (click)="selectStatus('Expired', $event)">Expired</li>
                    </ul>
                </div>

                <!-- Start Date -->
                <div class="form-field custom-date">
                    <label>Start Date</label>

                    <div class="date-input-wrapper">
                        <input type="date">
                        <span class="calendar-icon">📅</span>
                    </div>
                </div>

                <!-- End Date -->
                <div class="form-field custom-date">
                    <label>End Date</label>

                    <div class="date-input-wrapper">
                        <input type="date">
                        <span class="calendar-icon">📅</span>
                    </div>
                </div>
            </div>

            <!-- Submit Button -->
            <div class="btn-container">
                <button class="cancel-btn" (click)="resetFilters()" type="button">Reset</button>
                <button class="delete-btn" (click)="applyFilters()" type="button">Apply</button>
            </div>

        </form>
    </div>
</div>
