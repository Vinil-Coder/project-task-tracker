<div class="page-container">
    <div class="container">
        <h2>Login to Task Tracker</h2>

        <form [formGroup]="loginForm" (ngSubmit)="onFormSubmit()">

            <div class="form-field">
                <label>Email</label>

                <input type="email" placeholder="Enter email" formControlName="email">

                <div *ngIf="f['email'].touched || f['email'].dirty" class="validation-error">

                    <div *ngIf="f['email'].errors?.['required']">
                        Email is required
                    </div>

                    <div *ngIf="f['email'].errors?.['email']">
                        Invalid email format
                    </div>

                </div>
            </div>


            <div class="form-field password-field">
                <label>Password</label>

                <div class="password-input">
                    <input [type]="showPassword ? 'text' : 'password'" placeholder="Enter password"
                        formControlName="password">

                    <span class="password-reveal" (click)="togglePassword()">
                        <!-- Eye SVG -->
                        <svg width="22" height="22" viewBox="0 0 24 24">
                            <path fill="currentColor"
                                d="M12 5c-7 0-10 7-10 7s3 7 10 7s10-7 10-7s-3-7-10-7Zm0 11a4 4 0 1 1 0-8a4 4 0 0 1 0 8Z" />
                        </svg>
                    </span>
                </div>

                <div *ngIf="f['password'].touched || f['password'].dirty" class="validation-error">

                    <div *ngIf="f['password'].errors?.['required']">
                        Password is required
                    </div>
                    <div *ngIf="f['password'].errors?.['pattern']">
                        Password must contain 1 lowercase letter, 1 uppercase letter, 1 digit, and be between 8 - 12
                        characters long.
                    </div>

                </div>
            </div>

            <div *ngIf="store.error()" class="api-error">
                {{ store.error() }}
            </div>

            <button type="submit">
                {{ store.isLoading() ? 'Logging ...' : 'Login' }}
            </button>

            <div class="signup-link">
                Don't have an account ?
                <a routerLink="/register">Register here</a>
            </div>

            <div *ngIf="store.isLoading()" class="loading-overlay">
                <div class="loader"></div>
            </div>

        </form>
    </div>
</div>
